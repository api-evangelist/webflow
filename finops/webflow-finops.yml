meters:
  - name: site_subscription
    description: Recurring Site Plan subscription (Starter / Basic / CMS / Business / Enterprise) per
      hosted site.
    unit: month
    aggregation: sum
    dimensions:
      - site
      - tier
  - name: workspace_seat
    description: Workspace seat subscription (Starter / Core / Growth / Freelancer / Agency / Enterprise).
    unit: seat
    aggregation: sum
    dimensions:
      - workspace
      - tier
  - name: ecommerce_subscription
    description: Ecommerce Plan subscription (Standard / Plus / Advanced) per store.
    unit: month
    aggregation: sum
    dimensions:
      - site
      - tier
  - name: ecommerce_transaction_fee
    description: 2% Webflow transaction fee on the Ecommerce Standard plan; 0% on Plus and Advanced.
    unit: transaction
    aggregation: sum
    dimensions:
      - site
      - tier
  - name: bandwidth_overage
    description: Bandwidth consumed against the Site Plan's monthly bandwidth quota; overage handling
      is per the Site Plan tier.
    unit: GB
    aggregation: sum
    dimensions:
      - site
      - tier
principles:
  - name: Visibility
    description: Cost visibility is via the Workspace billing dashboard at webflow.com — review the
      site / seat / ecommerce subscriptions per workspace and the bandwidth meter on each site dashboard.
  - name: Allocation
    description: Allocate Webflow spend by workspace (one workspace per business unit / agency client),
      site (one per brand or property), and seat (named designer / developer). Workspace billing
      consolidates all sites under a workspace into one invoice.
  - name: Optimization
    description: Cost levers are (1) move stores from Standard (2% fee) to Plus (0%) once monthly GMV
      makes the $74 vs $29 delta worthwhile; (2) consolidate underused workspaces; (3) drop unused
      Site Plans on staging projects; (4) keep API calls under the per-key per-minute limit to avoid
      forcing an Enterprise upgrade for rate alone — use webhooks instead of polling.
  - name: Accountability
    description: Workspace owner / billing admin holds accountability; design / engineering owners
      review site bandwidth, CMS-item counts, and API rate-limit alerts before adding new sites or
      higher-traffic launches.
