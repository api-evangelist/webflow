description: FOCUS-aligned FinOps for Webflow. Webflow bills as tiered subscriptions across three
  product surfaces — Site Plans (per-site), Workspace Plans (per-seat), and Ecommerce Plans (per-store
  + transaction-fee on Standard) — invoiced monthly or annually in USD. The Data API itself is bundled
  with the Site Plan and rate-limited rather than metered, so cost optimization centers on right-sizing
  Site / Workspace / Ecommerce tiers.
sources:
  - https://webflow.com/pricing
  - https://developers.webflow.com/data/reference/rate-limits
billingModel:
  pricingCategory: Tiered Subscription
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
    - Purchase
    - Usage
focusColumns:
  ServiceName: Webflow
  ServiceCategory: Web Publishing / CMS
  ProviderName: Webflow
  PublisherName: Webflow, Inc.
  InvoiceIssuerName: Webflow, Inc.
