specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Webflow
providerId: webflow
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - CMS
  - Ecommerce
  - No-Code
  - Web Development
description: Webflow sells three product surfaces with their own plan ladders - Site Plans (per-site
  hosting tier), Workspace Plans (collaboration / agency seats), and Ecommerce Plans (store catalog
  + transaction-fee tier). API rate limits are tied to the Site Plan (60 req/min on Starter and Basic;
  120 req/min on CMS, eCommerce, and Business; custom on Enterprise) and are tracked separately in
  the rate-limits artifact. Prices below are the "billed yearly" monthly rate published on
  webflow.com/pricing.
sources:
  - https://webflow.com/pricing
  - https://developers.webflow.com/data/reference/rate-limits
plans:
  - id: webflow-site-starter
    name: Site - Starter
    type: freemium
    description: Free site plan; 2 pages, 50 lifetime form submits, 1 GB bandwidth. API limited to
      60 req/min.
    entries:
      - label: Site Subscription
        name: site_subscription
        type: subscription
        metric: month
        limit: 1
        timeFrame: month
        geo: global
        unit: 1
        price: '$0'
        userMultiplied: false
      - label: Pages
        name: pages
        type: quota
        metric: page
        limit: 2
        timeFrame: usage
        geo: global
        unit: 1
        price: included
        userMultiplied: false
      - label: CMS Items
        name: cms_items
        type: quota
        metric: item
        limit: 50
        timeFrame: usage
        geo: global
        unit: 1
        price: included
        userMultiplied: false
      - label: Bandwidth
        name: bandwidth
        type: quota
        metric: gb
        limit: 1
        timeFrame: month
        geo: global
        unit: 1
        price: included
        userMultiplied: false
      - label: Form Submissions
        name: form_submits
        type: quota
        metric: submission
        limit: 50
        timeFrame: usage
        geo: global
        unit: 1
        price: included
        userMultiplied: false
    elements:
      - name: webflow.io subdomain
      - name: Hosted via Webflow
      - name: API access at 60 req/min
