  pages(limit: Int, offset: Int): PageListPage!
  assets(limit: Int, offset: Int): AssetPage!
  forms(limit: Int, offset: Int): FormPage!
  webhooks: [Webhook!]!
  components(limit: Int, offset: Int): ComponentPage!
  scripts: [RegisteredScript!]!
  redirects: [Redirect!]!
