# Webflow Conceptual GraphQL Schema
# Derived from the Webflow Data API v2 (REST) OpenAPI specification.
# No live GraphQL endpoint exists as of June 2026. This is a conceptual SDL.
# Source: https://developers.webflow.com/data/reference/rest-introduction

# ─────────────────────────────────────────────
# Scalars
# ─────────────────────────────────────────────

scalar DateTime
scalar JSON
scalar URL

# ─────────────────────────────────────────────
# Enums
# ─────────────────────────────────────────────

enum PublishStatus {
  LIVE
  STAGED
  DRAFT
}

enum FieldType {
  PLAIN_TEXT
  RICH_TEXT
  IMAGE
  MULTI_IMAGE
  VIDEO_LINK
  LINK
  EMAIL
  PHONE
  NUMBER
  DATE_TIME
  SWITCH
  COLOR
  FILE
  REFERENCE
  MULTI_REFERENCE
  OPTION
  SET
}

enum ItemStatus {
  LIVE
  STAGED
  ARCHIVED
}

enum OrderStatus {
  UNFULFILLED
  FULFILLED
  PARTIALLY_FULFILLED
  REFUNDED
  DISPUTED
  CANCELED
}

enum WebhookTriggerType {
  FORM_SUBMISSION
  SITE_PUBLISH
  ECOMM_NEW_ORDER
  ECOMM_ORDER_CHANGED
  ECOMM_INVENTORY_CHANGED
  COLLECTION_ITEM_CREATED
  COLLECTION_ITEM_CHANGED
  COLLECTION_ITEM_DELETED
  COLLECTION_ITEM_PUBLISHED
  COLLECTION_ITEM_UNPUBLISHED
  PAGE_CREATED
  PAGE_METADATA_UPDATED
  PAGE_DELETED
  COMMENT_CREATED
}

enum ScriptLocation {
  HEADER
  FOOTER
}

enum ScriptVersion {
  LATEST
  PINNED
}

enum InventoryType {
  FINITE
  INFINITE
}

enum AssetVariantType {
  ORIGINAL
  OPTIMIZED
  THUMBNAIL
}

enum AuditLogAction {
  CREATE
  UPDATE
  DELETE
  PUBLISH
  UNPUBLISH
  INVITE
  REVOKE
}

# ─────────────────────────────────────────────
# Meta / Auth
# ─────────────────────────────────────────────

type AuthorizedUser {
  id: ID!
  email: String!
  firstName: String
  lastName: String
  workspaces: [Workspace!]!
}

type TokenInfo {
  token: String!
  userId: ID!
  email: String!
  scopes: [String!]!
  workspaces: [WorkspacePermission!]!
  sites: [SitePermission!]!
  rateLimit: RateLimit
}

type WorkspacePermission {
  workspaceId: ID!
  workspaceName: String
  scopes: [String!]!
}

type SitePermission {
  siteId: ID!
  siteName: String
  scopes: [String!]!
}

type RateLimit {
  limit: Int!
  remaining: Int!
  resetAt: DateTime!
}

# ─────────────────────────────────────────────
# Workspace
# ─────────────────────────────────────────────

type Workspace {
  id: ID!
  name: String!
