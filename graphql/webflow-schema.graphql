}

type WorkspacePlan {
  workspaceId: ID!
  tier: String!
  maxSites: Int
  maxMembers: Int
}

# ─────────────────────────────────────────────
# Audit Log
# ─────────────────────────────────────────────

type AuditLog {
  id: ID!
  workspaceId: ID!
  userId: ID!
  userEmail: String
  action: AuditLogAction!
  resourceType: String!
  resourceId: String
  resourceName: String
  createdAt: DateTime!
  metadata: JSON
}

type AuditLogPage {
  items: [AuditLog!]!
  total: Int!
  limit: Int!
  offset: Int!
}

# ─────────────────────────────────────────────
# Site
# ─────────────────────────────────────────────

type Site {
