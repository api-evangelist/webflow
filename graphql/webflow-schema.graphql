# ─────────────────────────────────────────────
# Query
# ─────────────────────────────────────────────

type Query {
  # Meta
  me: AuthorizedUser!
  tokenInfo: TokenInfo!

  # Workspaces
  workspace(id: ID!): Workspace
  workspaces: [Workspace!]!

  # Sites
  site(id: ID!): Site
  sites(workspaceId: ID): SitePage!

  # Pages
  page(siteId: ID!, pageId: ID!): Page
  pages(siteId: ID!, limit: Int, offset: Int): PageListPage!

  # Components
  component(siteId: ID!, componentId: ID!): Component
  components(siteId: ID!, limit: Int, offset: Int): ComponentPage!

  # Collections
  collection(id: ID!): Collection
  collections(siteId: ID!, limit: Int, offset: Int): CollectionPage!

  # Items
  collectionItem(collectionId: ID!, itemId: ID!): CollectionItem
  collectionItems(collectionId: ID!, limit: Int, offset: Int, status: ItemStatus): CollectionItemPage!
  liveCollectionItem(collectionId: ID!, itemId: ID!): CollectionItem
  liveCollectionItems(collectionId: ID!, limit: Int, offset: Int): CollectionItemPage!

  # Assets
  asset(siteId: ID!, assetId: ID!): Asset
  assets(siteId: ID!, limit: Int, offset: Int): AssetPage!
  assetFolder(siteId: ID!, folderId: ID!): AssetFolder
  assetFolders(siteId: ID!): [AssetFolder!]!

  # Forms
  form(siteId: ID!, formId: ID!): Form
  forms(siteId: ID!, limit: Int, offset: Int): FormPage!
  formSubmissions(formId: ID!, limit: Int, offset: Int): FormSubmissionPage!

  # Ecommerce
  product(siteId: ID!, productId: ID!): Product
  products(siteId: ID!, limit: Int, offset: Int): ProductPage!
  order(siteId: ID!, orderId: ID!): Order
  orders(siteId: ID!, status: OrderStatus, limit: Int, offset: Int): OrderPage!
  inventory(skuId: ID!): Inventory
  ecommerceSettings(siteId: ID!): EcommerceSettings

  # Webhooks
  webhook(siteId: ID!, webhookId: ID!): Webhook
  webhooks(siteId: ID!): [Webhook!]!

  # Custom Code
  siteCustomCode(siteId: ID!): CustomCodeBlock
  pageCustomCode(siteId: ID!, pageId: ID!): CustomCodeBlock
  registeredScripts(siteId: ID!): [RegisteredScript!]!

  # Comments
  commentThread(siteId: ID!, threadId: ID!): CommentThread
  commentThreads(siteId: ID!, pageId: ID, limit: Int, offset: Int): CommentThreadPage!

  # Custom Domains
  customDomains(siteId: ID!): [CustomDomain!]!

  # Redirects
  redirect(siteId: ID!, redirectId: ID!): Redirect
  redirects(siteId: ID!): [Redirect!]!

  # Audit Logs
  auditLogs(workspaceId: ID!, limit: Int, offset: Int): AuditLogPage!

  # Activity Logs
  activityLogs(siteId: ID!, limit: Int, offset: Int): ActivityLogPage!

  # Site Plan
  sitePlan(siteId: ID!): SitePlan

  # Robots.txt
  robotsTxt(siteId: ID!): RobotsTxt
}

# ─────────────────────────────────────────────
# Mutation
# ─────────────────────────────────────────────

type Mutation {
  # Collections
  createCollection(input: CreateCollectionInput!): Collection!
  deleteCollection(id: ID!): Boolean!
  createCollectionField(input: CreateCollectionFieldInput!): CollectionField!
  deleteCollectionField(collectionId: ID!, fieldId: ID!): Boolean!

  # Items
  createCollectionItem(input: CreateCollectionItemInput!): CollectionItem!
  updateCollectionItem(input: UpdateCollectionItemInput!): CollectionItem!
  deleteCollectionItem(collectionId: ID!, itemId: ID!): Boolean!
  publishCollectionItems(collectionId: ID!, itemIds: [ID!]!): BulkOperationResult!
  unpublishCollectionItems(collectionId: ID!, itemIds: [ID!]!): BulkOperationResult!
  bulkCreateCollectionItems(collectionId: ID!, items: [CreateCollectionItemInput!]!): BulkOperationResult!
  bulkUpdateCollectionItems(collectionId: ID!, items: [UpdateCollectionItemInput!]!): BulkOperationResult!
  bulkDeleteCollectionItems(collectionId: ID!, itemIds: [ID!]!): BulkOperationResult!

  # Sites
  publishSite(input: PublishSiteInput!): PublishResult!
  createRedirect(input: CreateRedirectInput!): Redirect!
  updateRedirect(id: ID!, fromPath: String, toPath: String, statusCode: Int): Redirect!
  deleteRedirect(siteId: ID!, redirectId: ID!): Boolean!
  updateRobotsTxt(siteId: ID!, content: String!): RobotsTxt!

  # Assets
  createAssetUploadUrl(siteId: ID!, fileName: String!, fileHash: String!): AssetUploadUrl!
  updateAsset(id: ID!, displayName: String, altText: String): Asset!
  deleteAsset(id: ID!): Boolean!
  createAssetFolder(siteId: ID!, displayName: String!, parentFolderId: ID): AssetFolder!
  updateAssetFolder(id: ID!, displayName: String): AssetFolder!
  deleteAssetFolder(id: ID!): Boolean!

  # Products
  createProduct(input: CreateProductInput!): Product!
  updateProduct(id: ID!, fieldData: ProductFieldDataInput): Product!
  createSku(productId: ID!, input: CreateSkuInput!): Sku!
  updateSku(id: ID!, productId: ID!, fieldData: SkuFieldDataInput): Sku!

  # Orders
  updateOrder(input: UpdateOrderInput!): Order!
  fulfillOrder(orderId: ID!, sendEmailNotification: Boolean): Order!
  unfulfillOrder(orderId: ID!): Order!
  refundOrder(orderId: ID!): Order!

  # Inventory
  updateInventory(input: UpdateInventoryInput!): Inventory!

  # Form submissions
  deleteFormSubmission(formId: ID!, submissionId: ID!): Boolean!

  # Webhooks
  createWebhook(input: CreateWebhookInput!): Webhook!
  deleteWebhook(siteId: ID!, webhookId: ID!): Boolean!

  # Custom Code
  registerScript(input: RegisterScriptInput!): RegisteredScript!
  deleteRegisteredScript(siteId: ID!, scriptId: ID!): Boolean!
  applySiteCustomCode(siteId: ID!, scripts: [ApplyScriptInput!]!): CustomCodeBlock!
