  /pages/{page_id}/dom:
    get:
      x-fern-sdk-group-name: pages
      x-fern-sdk-method-name: get-content
      security:
      - OAuth2:
        - page:read
      operationId: get-static-content
      summary: Get Page Content
      description: 'Get text and component instance content from a static page.


        <Badge intent="info">Localization</Badge>


        Required scope | `pages:read`

        '
      tags:
      - Pages
      parameters:
      - name: page_id
        in: path
        description: Unique identifier for a Page
        example: 63c720f9347c2139b248e552
        required: true
        schema:
          type: string
          format: objectid
          default: null
      - name: localeId
        in: query
        allowEmptyValue: true
        example: 65427cf400e02b306eaa04a0
        description: 'Unique identifier for a specific Locale.


          [Lear more about localization.](/data/v2.0.0/docs/working-with-localization)

          '
        schema:
          type: string
      - in: query
        allowEmptyValue: true
        name: limit
        example: 100
        description: 'Maximum number of records to be returned (max limit: 100)'
        required: false
        schema:
          type: integer
      - in: query
        example: 0
        allowEmptyValue: true
        name: offset
        description: Offset used for pagination if the results have more than limit records
        required: false
        schema:
          type: integer
      responses:
        '200':
          description: Request was successful
          content:
            application/json:
              schema:
                description: 'The DOM (Document Object Model) schema represents the content structure of a web page or component.
                  It captures various content nodes along with their associated attributes. Each node has a unique identifier
                  and can be of different types like text, image or component-instance. The schema also provides pagination
                  details for scenarios where the content nodes are too many to be fetched in a single request.

                  '
                type: object
                example:
                  pageId: 658205daa3e8206a523b5ad4
                  nodes:
                  - id: a245c12d-995b-55ee-5ec7-aa36a6cad623
                    type: text
                    text:
                      html: <h1>The Hitchhiker's Guide to the Galaxy</h1>
                      text: The Hitchhiker's Guide to the Galaxy
                    attributes: {}
                  - id: a245c12d-995b-55ee-5ec7-aa36a6cad627
                    type: text
                    text:
                      html: <div><h3>Don't Panic!</h3><p>Always know where your towel is.</p></div>
                      text: null
                    attributes:
                      number: forty two
                  - id: a245c12d-995b-55ee-5ec7-aa36a6cad629
                    type: image
                    image:
                      alt: Marvin, the Paranoid Android
                      assetId: 659595234426a9fcbad57043
                    attributes: {}
                  - id: a245c12d-995b-55ee-5ec7-aa36a6cad635
                    type: select
                    choices:
                    - value: choice-1
                      text: First choice
                    - value: choice-2
                      text: Second choice
                    attributes: {}
                  - id: a245c12d-995b-55ee-5ec7-aa36a6cad642
                    type: text-input
                    placeholder: Enter something here...
                    attributes: {}
                  - id: a245c12d-995b-55ee-5ec7-aa36a6cad671
                    type: submit
                    value: Submit
                    waitingText: Submitting...
                    attributes: {}
                  - id: a245c12d-995b-55ee-5ec7-aa36a6cad631
                    type: component-instance
                    componentId: 6258612d1ee792848f805dcf
                    propertyOverrides:
                    - propertyId: a245c12d-995b-55ee-5ec7-aa36a6cad633
                      type: Plain Text
                      label: Catchphrase
                      text:
                        html: null
                        text: Don't Panic!
                    - propertyId: a245c12d-995b-55ee-5ec7-aa36a6cad635
                      type: Rich Text
                      label: Tagline
                      text:
                        html: <div><p>Always know where your towel is.</p></div>
                        text: null
