    put:
      security:
      - OAuth2:
        - page:write
      description: 'Update Page-level metadata, including SEO and Open Graph fields.


        Required scope | `pages:write`

        '
      summary: Update Page Metadata
      operationId: update-page-settings
      tags:
      - Pages
      parameters:
      - name: page_id
        in: path
        description: Unique identifier for a Page
        example: 63c720f9347c2139b248e552
        required: true
        schema:
          type: string
          format: objectid
          default: null
      - name: localeId
        in: query
        allowEmptyValue: true
        example: 65427cf400e02b306eaa04a0
        description: 'Unique identifier for a specific Locale.


          [Lear more about localization.](/data/v2.0.0/docs/working-with-localization)

          '
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              description: The values to update on the Page
              type: object
              example:
                title: Guide to the Galaxy
                slug: guide-to-the-galaxy
                seo:
                  title: The Ultimate Hitchhiker's Guide to the Galaxy
                  description: Everything you need to know about the galaxy, from avoiding Vogon poetry to the importance
                    of towels.
                openGraph:
                  title: Explore the Cosmos with The Ultimate Guide
                  titleCopied: false
                  description: Dive deep into the mysteries of the universe with your guide to everything galactic.
                  descriptionCopied: false
              properties:
                title:
                  type: string
                  description: Title for the page
                  example: My New Page
                slug:
                  type: string
                  description: 'Slug for the page.



                    **Note:** Updating slugs in secondary locales is only supported in <a href="https://webflow.com/localization">Advanced
                    and Enterprise localization add-on plans.</a>

                    '
                  example: my-new-page
                seo:
                  type: object
                  description: SEO-related fields for the Page
                  properties:
                    title:
                      type: string
                      description: The Page title shown in search engine results
                      example: CoffeeStyle eCommerce - Webflow HTML website template
                    description:
                      type: string
                      description: The Page description shown in search engine results
                      example: This Webflow template offers a quick start into an ecommerce / memberships site
                openGraph:
                  type: object
                  description: Open Graph fields for the Page
                  properties:
                    title:
                      type: string
                      description: The title supplied to Open Graph annotations
                      example: My snazzy Open Graph title
                    titleCopied:
                      type: boolean
                      description: Indicates the Open Graph title was copied from the SEO title
                    description:
                      type: string
                      description: The description supplied to Open Graph annotations
                      example: My informative Open Graph description
                    descriptionCopied:
                      type: boolean
                      description: Indicates the Open Graph description was copied from the SEO description
      responses:
        '200':
          description: Request was successful
          content:
            application/json:
              schema:
                description: The Page object
                type: object
                required:
                - id
                example:
                  id: 6596da6045e56dee495bcbba
                  siteId: 6258612d1ee792848f805dcf
                  parentId: null
                  collectionId: null
                  title: Guide to the Galaxy
                  slug: guide-to-the-galaxy
                  createdOn: '2024-03-11T10:42:00.000Z'
                  lastUpdated: '2024-03-11T10:42:42.000Z'
                  archived: false
                  draft: false
                  canBranch: false
                  isBranch: true
                  branchId: 68026fa68ef6dc744c75b833
                  seo:
                    title: The Ultimate Hitchhiker's Guide to the Galaxy
                    description: Everything you need to know about the galaxy, from avoiding Vogon poetry to the importance
                      of towels.
                  openGraph:
                    title: Explore the Cosmos with The Ultimate Guide
                    titleCopied: false
                    description: Dive deep into the mysteries of the universe with your guide to everything galactic.
                    descriptionCopied: false
                  localeId: 653fd9af6a07fc9cfd7a5e57
                  publishedPath: /en-us/guide-to-the-galaxy
                properties:
                  id:
                    type: string
                    format: objectid
                    description: Unique identifier for the Page
                    example: 63499e4e6e9ed5abbfe42b69
                  siteId:
                    type: string
                    format: objectid
                    readOnly: true
                    description: Unique identifier for the Site
                    example: 580e63e98c9a982ac9b8b741
                  title:
                    type: string
                    description: Title of the Page
                    example: My New Page
                  slug:
                    type: string
                    description: slug of the Page (derived from title)
                    example: my-new-page
                  parentId:
                    type: string
                    format: objectid
                    description: Identifier of the parent folder
                    readOnly: true
                    example: 6419db964a9c435aa3af6251
                  collectionId:
                    type: string
                    format: objectid
                    readOnly: true
                    description: Unique identifier for a linked Collection, value will be null if the Page is not part of
                      a Collection.
                    example: 6390c49774a71f12831a08e3
                  createdOn:
                    type: string
                    format: date-time
                    readOnly: true
                    description: The date the Page was created
                    example: '2016-10-24T19:42:38.929Z'
                  lastUpdated:
                    type: string
                    format: date-time
                    readOnly: true
                    description: The date the Page was most recently updated
                    example: '2016-10-24T19:42:38.929Z'
                  archived:
                    type: boolean
                    description: Whether the Page has been archived
                    default: false
                    example: false
                    readOnly: true
                  draft:
                    type: boolean
                    description: Whether the Page is a draft
                    default: false
                    example: false
                    readOnly: true
                  canBranch:
                    type: boolean
                    description: Indicates whether the Page supports [Page Branching](https://university.webflow.com/lesson/page-branching).
                      Pages that are already branches cannot be branched again.
                    readOnly: true
                    default: false
                    example: false
                  isBranch:
                    type: boolean
                    description: Indicates whether the Page is a Branch of another Page [Page Branching](https://university.webflow.com/lesson/page-branching)
                    readOnly: true
                    default: false
                    example: false
                  branchId:
                    type: string
                    format: objectid
                    nullable: true
                    description: If the Page is a Branch of another Page, this is the ID of the Branch
                    example: 68026fa68ef6dc744c75b833
                  seo:
                    type: object
                    description: SEO-related fields for the Page
                    properties:
                      title:
                        type: string
                        description: The Page title shown in search engine results
                        example: CoffeeStyle eCommerce - Webflow HTML website template
                      description:
                        type: string
                        description: The Page description shown in search engine results
                        example: This Webflow template offers a quick start into an ecommerce / memberships site
                  openGraph:
                    type: object
                    description: Open Graph fields for the Page
                    properties:
                      title:
                        type: string
                        description: The title supplied to Open Graph annotations
                        example: My snazzy Open Graph title
                      titleCopied:
                        type: boolean
                        description: Indicates the Open Graph title was copied from the SEO title
                        readOnly: true
                        default: true
                      description:
                        type: string
                        description: The description supplied to Open Graph annotations
                        example: My informative Open Graph description
                      descriptionCopied:
                        type: boolean
                        description: Indicates the Open Graph description was copied from the SEO description
                        readOnly: true
                        default: true
                  localeId:
                    description: Unique ID of the page locale
                    type: string
                    format: objectid
                    nullable: true
                    readOnly: true
                    example: 653fd9af6a07fc9cfd7a5e57
                  publishedPath:
                    description: Relative path of the published page URL
                    type: string
                    readOnly: true
                    example: /heart-of-gold
