    post:
      security:
      - OAuth2:
        - page:write
      summary: Update Page Content
      description: "This endpoint updates content on a static page in **secondary locales**. It supports updating up to 1000\
        \ nodes in a single request.\n\nBefore making updates:\n1. Use the [get page content](/data/reference/pages-and-components/pages/get-content)\
        \ endpoint to identify available content nodes and their types.\n2. If the page has component instances, retrieve\
        \ the component's properties that you'll override using the [get component properties](/data/reference/pages-and-components/components/get-properties)\
        \ endpoint.\n3. DOM elements may include a `data-w-id` attribute. This attribute is used by Webflow to maintain custom\
        \ attributes and links across locales. Always include the original `data-w-id` value in your update requests to ensure\
        \ consistent behavior across all locales.\n\n<Note>\n  This endpoint is specifically for localized pages. Ensure that\
        \ the specified `localeId` is a valid **secondary locale** for the site otherwise the request will fail.\n</Note>\n\
        \nRequired scope | `pages:write`\n"
      operationId: update-static-content
      tags:
      - Pages
      parameters:
      - name: page_id
        in: path
        description: Unique identifier for a Page
        example: 63c720f9347c2139b248e552
        required: true
        schema:
          type: string
          format: objectid
          default: null
      - name: localeId
        in: query
        required: true
        description: The locale identifier.
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              description: 'The body for which to update the page dom nodes. Nodes can be of type text or component instances.

                '
              type: object
              properties:
                nodes:
                  type: array
                  description: List of DOM Nodes with the new content that will be updated in each node.
                  items:
                    type: object
                    oneOf:
                    - type: object
                      title: Text Node
                      description: Update a text node
                      properties:
                        nodeId:
                          type: string
                          description: Node UUID
                          example: a245c12d-995b-55ee-5ec7-aa36a6cad623
                        text:
