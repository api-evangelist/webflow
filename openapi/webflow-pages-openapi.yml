                    example: 68026fa68ef6dc744c75b833
                  nodes:
                    type: array
                    items:
                      description: 'A generic representation of a content element within the Document Object Model (DOM).
                        Each node has a unique identifier and a specific type that determines its content structure and attributes.

                        '
                      type: object
                      properties: null
                      oneOf:
                      - title: Text Node DOM
                        description: 'Represents text content within the DOM. It contains both the raw text and its HTML representation.
                          Additional attributes can be associated with the text for styling or other purposes.

                          '
                        type: object
                        required:
                        - id
                        - type
                        - text
                        properties:
                          id:
                            type: string
                            description: Node UUID
                          type:
