  /sites/{site_id}/comments/{comment_thread_id}/replies:
    get:
      x-fern-sdk-group-name:
        - sites
        - comments
      x-fern-sdk-method-name: list-comment-replies
      security:
        - OAuth2:
            - comments:read
      operationId: list-comment-replies
      summary: Webflow List Comment Replies
      description: "List all replies to a specific comment thread.\n\n<Note title=\"Timing of comment threads\">\n  There may be a delay of up to 5 minutes before new comments appear in the system.\n</Note>\n\nRequired scope | `comments:read`\n"
      tags:
        - Comments
        - Sites
      parameters:
        - name: site_id
          in: path
          description: Unique identifier for a Site
          example: 580e63e98c9a982ac9b8b741
          required: true
          schema:
            type: string
            format: objectid
            default:
        - name: comment_thread_id
          in: path
          description: Unique identifier for a Comment Thread
          example: 580e63e98c9a982ac9b8b741
          required: true
          schema:
            type: string
            format: objectid
        - name: localeId
          in: query
          allowEmptyValue: true
          example: 65427cf400e02b306eaa04a0
          description: 'Unique identifier for a specific Locale.


            [Lear more about localization.](/data/v2.0.0/docs/working-with-localization)

            '
          schema:
            type: string
        - in: query
          example: 0
          allowEmptyValue: true
          name: offset
          description: Offset used for pagination if the results have more than limit records
          required: false
          schema:
            type: integer
        - in: query
          allowEmptyValue: true
          name: limit
          example: 100
          description: 'Maximum number of records to be returned (max limit: 100)'
          required: false
          schema:
            type: integer
        - name: sortBy
          in: query
          allowEmptyValue: true
          description: Sort results by the provided value. Only allowed when sortOrder is provided.
          required: false
          schema:
            type: string
            enum:
              - createdOn
              - lastUpdated
        - name: sortOrder
          in: query
          allowEmptyValue: true
          description: Sorts the results by asc or desc
          required: false
          schema:
            type: string
            enum:
              - asc
              - desc
      responses:
        '200':
          description: Request was successful
          content:
            application/json:
              schema:
                description: 'A list of comment replies.

                  '
                required:
                  - comments
                  - pagination
                properties:
                  comments:
                    type: array
                    items:
                      description: 'A comment thread represents a conversation between users on a specific page. Each comment thread has a unique identifier and can contain multiple comments.

                        '
                      type: object
                      required:
                        - id
                        - commentId
                        - siteId
                        - pageId
                        - breakpoint
                        - content
                        - isResolved
                        - author
                        - lastUpdated
                        - createdOn
                      properties:
                        id:
                          type: string
                          example: 580e64008c9a982ac9b8b754
                          description: Unique identifier for the comment thread
                        commentId:
                          type: string
                          example: 679d2ddb5196117ad04d1ff8
                          description: The comment reply unique identifier
                        siteId:
                          type: string
                          example: 580e64008c9a982ac9b8b754
                          description: The site unique identifier
                        pageId:
                          type: string
                          example: 580e64008c9a982ac9b8b754
                          description: The page unique identifier
                        localeId:
                          type: string
                          readOnly: true
                          example: 580e64008c9a982ac9b8b754
                          description: The locale unique identifier
                        breakpoint:
                          type: string
                          example: main
                          description: The breakpoint the comment was left on
                        content:
                          type: string
                          example: This is a comment reply
                          description: The content of the comment reply
                        isResolved:
                          type: boolean
                          default: false
                          description: Boolean determining if the comment thread is resolved
                        author:
                          type: object
                          required:
                            - id
                            - email
                            - name
                          properties:
                            id:
                              type: string
                              description: The unique identifier of the author
                            email:
                              type: string
                              description: Email of the author
                            name:
                              type: string
                              description: Name of the author
                          example:
                            id: 6287ec36a841b25637c663df
                            email: email
                            name: name
                        mentionedUsers:
                          type: array
                          description: List of mentioned users is an empty array until email notifications are sent.
                          items:
                            type: object
                            required:
                              - id
                              - email
                              - name
                            properties:
                              id:
                                type: string
                                description: The unique identifier of the mentioned user
                              email:
                                type: string
                                description: Email of the user
                              name:
                                type: string
                                description: Name of the  User
                            example:
                              id: 6287ec36a841b25637c663df
                              email: arthur.dent@example.com
                              name: Arthur Dent
                        lastUpdated:
                          type: string
                          format: date-string
                          readOnly: true
                          example: '2023-03-17T18:47:35.560Z'
                          description: The date the item was last updated
                        createdOn:
                          type: string
                          format: date-string
                          readOnly: true
                          example: '2023-03-17T18:47:35.560Z'
                          description: The date the item was created
                  pagination:
                    type: object
                    required:
                      - limit
                      - offset
                      - total
                    properties:
                      limit:
                        type: integer
                        default: 100
                        description: The limit specified in the request (default 100)
                      offset:
                        type: integer
                        default: 0
                        description: The offset specified for pagination
                      total:
                        type: integer
                        description: Total number of comment replies
                example:
                  comments:
                    - id: 679d2ddb5196117ad04d1ffa
                      commentId: 679d2ddb5196117ad04d1ff8
                      siteId: 679826b3b20b045e176bc4b5
                      pageId: 679826b3b20b045e176bc4bc
                      localeId: 67993753d910db250db64b3e
                      itemId:
                      breakpoint: main
                      url: https://webflow.com/design/site-slug-4ec832?workflow=comment&commentId=679d2ddb5196117ad04d1ff8&pageId=679826b3b20b045e176bc4bc
                      content: 'This comment mentions another user [[6287ec36a841b25637c663df]] '
                      isResolved: false
                      author:
                        userId: 6287ec36a841b25637c663df
                        email: email
                        name: name
                      mentionedUsers:
                        - userId: 6287ec36a841b25637c663df
                          email: arthur.dent@example.com
                          name: Arthur Dent
                      createdOn: '2025-01-31T20:08:59.759Z'
                      lastUpdated: '2025-01-31T20:08:59.759Z'
                  pagination:
                    limit: 2
                    offset: 0
                    total: 1
