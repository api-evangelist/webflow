  /forms/{form_id}/submissions:
    get:
      x-fern-sdk-group-name: forms
      x-fern-sdk-method-name: list-submissions
      security:
        - OAuth2:
            - forms:read
      operationId: list-submissions
      summary: Webflow List Form Submissions
      description: "List form submissions for a given form\n\n<Note title=\"Forms in components\">\n  When a form is used in a component definition, each instance of the form is considered a unique form.\n\n  To get a combined list of submissions for a form that appears across multiple component instances, use the [List Form Submissions by Site](/data/reference/forms/form-submissions/list-submissions-by-site) endpoint.\n</Note>\n\nRequired scope | `forms:read`\n"
      tags:
        - Forms
      parameters:
        - name: form_id
          in: path
          description: Unique identifier for a Form
          example: 580e63e98c9a982ac9b8b741
          required: true
          schema:
            type: string
            format: objectid
        - in: query
          example: 0
          allowEmptyValue: true
          name: offset
          description: Offset used for pagination if the results have more than limit records
          required: false
          schema:
            type: integer
        - in: query
          allowEmptyValue: true
          name: limit
          example: 100
          description: 'Maximum number of records to be returned (max limit: 100)'
          required: false
          schema:
            type: integer
      responses:
        '200':
          description: Request was successful
          content:
            application/json:
              schema:
                description: A list of form submissions
                example:
                  formSubmissions:
                    - id: 6321ca84df3949bfc6752327
                      formId: 6321ca84df3949bfc6752327
                      displayName: Sample Form
                      siteId: 62749158efef318abc8d5a0f
                      workspaceId: 62749158efef318abc8d5a0f
                      formResponse:
                        First Name: Arthur
                        Last Name: Dent
                      dateSubmitted: '2022-09-14T12:35:16.117Z'
                    - id: 660d64fabf6e0a0d4edab981
                      formId: 6321ca84df3949bfc6752327
                      displayName: Sample Form
                      siteId: 62749158efef318abc8d5a0f
                      workspaceId: 62749158efef318abc8d5a0f
                      formResponse:
                        First Name: Ford
                        Last Name: Prefect
                      dateSubmitted: '2022-09-14T12:35:16.117Z'
                  pagination:
                    limit: 25
                    offset: 0
                    total: 2
                properties:
                  formSubmissions:
                    type: array
                    items:
                      example:
                        id: 6321ca84df3949bfc6752327
                        formId: 6321ca84df3949bfc6752327
                        displayName: Sample Form
                        siteId: 62749158efef318abc8d5a0f
                        workspaceId: 62749158efef318abc8d5a0f
                        formResponse:
                          First Name: Arthur
                          Last Name: Dent
                        dateSubmitted: '2022-09-14T12:35:16.117Z'
                      properties:
                        id:
                          type: string
                          format: objectid
                          description: The unique ID of the Form submission
                          example: 545bbecb7bdd6769632504a7
                        displayName:
                          type: string
                          description: The Form name displayed on the site
                          example: someone@email.com
                        siteId:
                          type: string
                          format: objectid
                          description: The unique ID of the Site the Form belongs to
                          example: 545bbecb7bdd6769632504a7
                        workspaceId:
                          type: string
                          format: objectid
                          description: The unique ID of the Workspace the Site belongs to
                          example: 580e63fc8c9a982ac9b8b744
                        dateSubmitted:
                          type: string
                          format: date-time
                          description: Date that the Form was submitted on
                          example: '2018-10-04T15:21:02.042Z'
                        formResponse:
                          type: object
                          description: The data submitted in the Form
                          example:
                            name: Arthur Dent
                            email: arthur.dent@mostlyharmless.com
                  pagination:
                    description: Pagination object
                    type: object
                    required:
                      - limit
                      - offset
                      - total
                    properties:
                      limit:
                        type: integer
                        description: The limit used for pagination
                        example: 100
                        readOnly: true
                      offset:
                        type: integer
                        description: The offset used for pagination
                        example: 0
                        readOnly: true
                      total:
                        type: integer
                        description: The total number of records
                        example: 100
                        readOnly: true
