    post:
      x-fern-sdk-group-name: components
      x-fern-sdk-method-name: update-content
      security:
        - OAuth2:
            - components:write
      summary: Webflow Update Component Content
      description: "This endpoint updates content within a component defintion for **secondary locales**. It supports updating up to 1000 nodes in a single request.\n\nBefore making updates:\n1. Use the [get component content](/data/reference/pages-and-components/components/get-content) endpoint to identify available content nodes and their types.\n2. If your component definition has a component instance nested within it, retrieve the nested component instance's properties that you'll override using the [get component properties](/data/reference/pages-and-components/components/get-properties) endpoint.\n3. DOM elements may include a `data-w-id` attribute. This attribute is used by Webflow to maintain custom attributes and links across locales. Always include the original `data-w-id` value in your update requests to ensure consistent behavior across all locales.\n\n<Note>\n  This endpoint is specifically for localizing component definitions. Ensure that the specified `localeId` is a valid **secondary locale** for the site otherwise the request will fail.\n</Note>\n\nRequired scope | `components:write`\n"
      operationId: update-component-content
      tags:
        - Components
      parameters:
        - name: site_id
          in: path
          description: Unique identifier for a Site
          example: 580e63e98c9a982ac9b8b741
          required: true
          schema:
            type: string
            format: objectid
            default:
        - name: component_id
          in: path
          description: Unique identifier for a Component
          example: 8505ba55-ef72-629e-f85c-33e4b703d48b
          required: true
          schema:
            type: string
            default:
        - name: localeId
          in: query
          allowEmptyValue: true
          example: 65427cf400e02b306eaa04a0
          description: 'Unique identifier for a specific Locale.


            [Lear more about localization.](/data/v2.0.0/docs/working-with-localization)

            '
          schema:
            type: string
        - name: branchId
          in: query
          allowEmptyValue: true
          description: Scope the operation to work on a specific branch.
          example: 68026fa68ef6dc744c75b833
          required: false
          schema:
            type: string
            format: objectid
      requestBody:
        content:
          application/json:
            schema:
              description: 'The body for which to update the Component DOM nodes. Nodes can be of type text, select or text input, submit button, or component instances.

                '
              type: object
              properties:
                nodes:
                  type: array
                  description: List of DOM Nodes with the new content that will be updated in each node.
                  items:
                    type: object
                    oneOf:
                      - type: object
                        title: Text Node
                        description: Update a text node
                        properties:
                          nodeId:
                            type: string
                            description: Node UUID
                            example: a245c12d-995b-55ee-5ec7-aa36a6cad623
                          text:
                            type: string
                            description: HTML content of the node, including the HTML tag. The HTML tags must be the same as what's returned from the Get Content endpoint.
                            example: <h1>Hello world</h1>
                        required:
                          - nodeId
                          - text
                        example:
                          nodes:
                            - nodeId: a245c12d-995b-55ee-5ec7-aa36a6cad623
                              text: <h1>The Hitchhiker's Guide to the Galaxy</h1>
                            - nodeId: a245c12d-995b-55ee-5ec7-aa36a6cad627
                              text: <div><h3>Don't Panic!</h3><p>Always know where your towel is.</p></div>
                      - type: object
                        title: Component Instance
                        description: Update text property overrides of a component instance
                        properties:
                          nodeId:
                            type: string
                            description: Node UUID
                            example: a245c12d-995b-55ee-5ec7-aa36a6cad623
                          propertyOverrides:
                            description: A list of component instance properties to override within the specified secondary locale.
                            type: array
                            items:
                              type: object
                              properties:
                                propertyId:
                                  type: string
                                  description: The ID of the property.
                                  example: 7dd14c08-2e96-8d3d-2b19-b5c03642a0f0
                                text:
                                  type: string
                                  description: 'The new string or HTML value used to override the component instance property value.

                                    The provided value must be compatible with the type of the component instance property.

                                    For example, attempting to override a single-line plain-text property with a multi-line

                                    value will result in an error.

                                    '
                                  example: <div><h1>Property with <em>Rich Text</em></h1></div>
                              required:
                                - propertyId
                                - text
                        required:
                          - nodeId
                          - propertyOverrides
                        example:
                          nodes:
                            - nodeId: a245c12d-995b-55ee-5ec7-aa36a6cad629
                              propertyOverrides:
                                - propertyId: 7dd14c08-2e96-8d3d-2b19-b5c03642a0f0
                                  text: <div><h1>Time is an <em>illusion</em></h1></div>
                                - propertyId: 7dd14c08-2e96-8d3d-2b19-b5c03642a0f1
                                  text: Life, the Universe and Everything
                      - type: object
                        title: Select
                        description: Update choices on a select node
                        properties:
                          nodeId:
                            type: string
                            description: Node UUID
                            example: a245c12d-995b-55ee-5ec7-aa36a6cad623
                          choices:
                            type: array
                            description: The list of choices to set on the select node.
                            items:
                              type: object
                              required:
                                - value
                                - text
                              properties:
                                value:
                                  description: The value of the choice when selected.
                                  type: string
                                text:
                                  description: The text to display for the choice.
                                  type: string
                        required:
                          - nodeId
                          - choices
                      - type: object
                        title: Text Input
                        description: Update placeholder text on a text input node
                        properties:
                          nodeId:
                            type: string
                            description: Node UUID
                            example: a245c12d-995b-55ee-5ec7-aa36a6cad623
                          placeholder:
                            description: The placeholder text of the input node
                            type: string
                        required:
                          - nodeId
                          - placeholder
                      - type: object
                        title: Submit Button
                        description: Update a submit button node
                        properties:
                          nodeId:
                            type: string
                            description: Node UUID
                            example: a245c12d-995b-55ee-5ec7-aa36a6cad623
                          value:
                            description: The text content of the submit button.
                            type: string
                          waitingText:
                            description: The text to show while the form is submitting.
                            type: string
                        required:
                          - nodeId
                      - type: object
                        title: Search Button
                        description: Update a search button node
                        properties:
                          nodeId:
                            type: string
                            description: Node UUID
                            example: a245c12d-995b-55ee-5ec7-aa36a6cad623
                          value:
                            description: The text content of the search button.
                            type: string
                        required:
                          - nodeId
                          - value
                  minItems: 1
                  maxItems: 1000
              required:
                - nodes
              example:
                nodes:
                  - nodeId: a245c12d-995b-55ee-5ec7-aa36a6cad623
                    text: <h1>The Hitchhiker's Guide to the Galaxy</h1>
                  - nodeId: a245c12d-995b-55ee-5ec7-aa36a6cad627
                    text: <div><h3>Don't Panic!</h3><p>Always know where your towel is.</p></div>
                  - nodeId: a245c12d-995b-55ee-5ec7-aa36a6cad635
                    choices:
                      - value: choice-1
                        text: First choice
                      - value: choice-2
                        text: Second choice
                  - nodeId: a245c12d-995b-55ee-5ec7-aa36a6cad642
                    placeholder: Enter something here...
                  - nodeId: a245c12d-995b-55ee-5ec7-aa36a6cad671
                    value: Submit
                    waitingText: Submitting...
                  - nodeId: a245c12d-995b-55ee-5ec7-aa36a6cad629
                    propertyOverrides:
                      - propertyId: 7dd14c08-2e96-8d3d-2b19-b5c03642a0f0
                        text: <div><h1>Time is an <em>illusion</em></h1></div>
                      - propertyId: 7dd14c08-2e96-8d3d-2b19-b5c03642a0f1
                        text: Life, the Universe and Everything
