  /sites/{site_id}/components/{component_id}/dom:
    get:
      x-fern-sdk-group-name: components
      x-fern-sdk-method-name: get-content
      security:
        - OAuth2:
            - components:read
      operationId: get-component-content
      summary: Webflow Get Component Content
      description: 'Get static content from a component definition. This includes text nodes, image nodes, select nodes, text input nodes, submit button nodes, and nested component instances.

        To retrieve dynamic content set by component properties, use the [get component properties](/data/reference/pages-and-components/components/get-properties) endpoint.


        <Note>If you do not provide a Locale ID in your request, the response will return any content that can be localized from the Primary locale.</Note>


        Required scope | `components:read`

        '
      tags:
        - Components
      parameters:
        - name: site_id
          in: path
          description: Unique identifier for a Site
          example: 580e63e98c9a982ac9b8b741
          required: true
          schema:
            type: string
            format: objectid
            default:
        - name: component_id
          in: path
          description: Unique identifier for a Component
          example: 8505ba55-ef72-629e-f85c-33e4b703d48b
          required: true
          schema:
            type: string
            default:
        - name: localeId
          in: query
          allowEmptyValue: true
          example: 65427cf400e02b306eaa04a0
          description: 'Unique identifier for a specific Locale.


            [Lear more about localization.](/data/v2.0.0/docs/working-with-localization)

            '
          schema:
            type: string
        - name: branchId
          in: query
          allowEmptyValue: true
          description: Scope the operation to work on a specific branch.
          example: 68026fa68ef6dc744c75b833
          required: false
          schema:
            type: string
            format: objectid
        - in: query
          allowEmptyValue: true
          name: limit
          example: 100
          description: 'Maximum number of records to be returned (max limit: 100)'
          required: false
          schema:
            type: integer
        - in: query
          example: 0
          allowEmptyValue: true
          name: offset
          description: Offset used for pagination if the results have more than limit records
          required: false
          schema:
            type: integer
      responses:
        '200':
          description: Request was successful
          content:
            application/json:
              schema:
                description: 'The Component DOM schema represents the content structure of a component. Similar to Page DOM, it captures various content nodes and their associated attributes, but specifically for a component''s structure. Each node has a unique identifier and can contain text, images, select or text inputs, submit buttons, or nested component instances.

                  '
                type: object
                example:
                  componentId: 69118560-d0bc-15fc-bbf8-b8fe5f6535b5
                  nodes:
                    - id: a245c12d-995b-55ee-5ec7-aa36a6cad623
                      type: text
                      text:
                        html: <h1>The Hitchhiker's Guide to the Galaxy</h1>
                        text: The Hitchhiker's Guide to the Galaxy
                      attributes: {}
                    - id: a245c12d-995b-55ee-5ec7-aa36a6cad627
                      type: text
                      text:
                        html: <div><h3>Don't Panic!</h3><p>Always know where your towel is.</p></div>
                        text:
                      attributes:
                        number: forty two
                    - id: a245c12d-995b-55ee-5ec7-aa36a6cad629
                      type: image
                      image:
                        alt: Marvin, the Paranoid Android
                        assetId: 659595234426a9fcbad57043
                      attributes: {}
                    - id: 6e468d51-8942-f7be-34cc-347b0e24e118
                      type: text-input
                      placeholder: Search…
                      attributes: {}
                    - id: 82cdcd0b-b9c7-0ddc-0519-bc1fa02de26e
                      type: select
                      choices:
                        - text: Magrathea
                          value: Magrathea
                        - text: Earth
                          value: mostly-harmless
                        - text: Vogsphere
                          value: Vogsphere
                      attributes: {}
                    - id: 9fa3a9c4-87d4-19b0-95f7-1b0b099f82ab
                      type: submit-button
                      waitingText: Please wait...
                      value: Subscribe
                      attributes: {}
                    - id: a245c12d-995b-55ee-5ec7-aa36a6cad631
                      type: component-instance
                      componentId: 6258612d1ee792848f805dcf
                      propertyOverrides:
                        - propertyId: a245c12d-995b-55ee-5ec7-aa36a6cad633
                          type: Plain Text
                          text:
                            html:
                            text: Don't Panic!
                        - propertyId: a245c12d-995b-55ee-5ec7-aa36a6cad635
                          type: Rich Text
                          text:
                            html: <div><p>Always know where your towel is.</p></div>
                            text:
                  pagination:
                    limit: 7
                    offset: 0
                    total: 7
                properties:
                  componentId:
                    type: string
                    description: Component ID
                  nodes:
                    type: array
                    items:
                      description: 'A generic representation of a content element within the Document Object Model (DOM). Each node has a unique identifier and a specific type that determines its content structure and attributes.

                        '
                      type: object
                      properties:
                      oneOf:
                        - title: Text Node DOM
                          description: 'Represents text content within the DOM. It contains both the raw text and its HTML representation. Additional attributes can be associated with the text for styling or other purposes.

                            '
                          type: object
                          required:
                            - id
                            - type
                            - text
                          properties:
                            id:
                              type: string
                              description: Node UUID
                            type:
                              description: The type of the node
                              type: string
                              enum:
                                - text
                              default: text
                            text:
                              description: The text content of the node
                              properties:
                                html:
                                  description: The HTML content of the text node.
                                  type: string
                                  nullable: true
                                text:
                                  description: The raw text content of the text node.
                                  type: string
                                  nullable: true
                            attributes:
                              type: object
                              description: The custom attributes of the node
                              additionalProperties:
                                type: string
                        - title: Image Node
                          description: 'Represents an image within the DOM. It contains details about the image, such as its alternative text (alt) for accessibility and an asset identifier for fetching the actual image resource. Additional attributes can be associated with the image for styling or other purposes.

                            '
                          type: object
                          required:
                            - id
                            - type
                            - image
                          properties:
                            id:
                              type: string
                              description: Node UUID
                            type:
                              type: string
                              description: The type of the node
                              enum:
                                - image
                              default: image
                            image:
                              description: The image details of the node
                              properties:
                                alt:
                                  type: string
                                  nullable: true
                                assetId:
                                  type: string
                            attributes:
                              type: object
                              description: The custom attributes of the node
                              additionalProperties:
                                type: string
                        - title: Component Node
                          description: 'Represents a component instance within the DOM. It contains details about the component instance, such as its type and properties.

                            '
                          type: object
                          required:
                            - id
                            - type
                            - componentId
                            - propertyOverrides
                          properties:
                            id:
                              type: string
                              description: The unique identifier of the component instance node
                            type:
                              description: The type of the node
                              type: string
                              enum:
                                - component-instance
                              default: component-instance
                            componentId:
                              type: string
                              description: The unique identifier of the component
                            propertyOverrides:
                              description: List of component properties with overrides for a component instance.
                              type: array
                              items:
                                description: 'Represents a property of a component instance in the DOM. A property contains a list of both the raw text and the HTML representation, allowing for flexibility in rendering and processing. Additional attributes can be associated with the text for styling or other purposes.

                                  '
                                type: object
                                properties:
                                  propertyId:
                                    type: string
                                    description: The ID of the property.
                                    example: 7dd14c08-2e96-8d3d-2b19-b5c03642a0f0
                                  type:
                                    description: The type of the property.
                                    type: string
                                    enum:
                                      - Plain Text
                                      - Rich Text
                                      - Alt Text
                                  label:
                                    description: The label of the property in the UI.
                                    type: string
                                  text:
                                    description: Represents text content within the DOM. It contains both the raw text and its HTML representation.
                                    properties:
                                      html:
                                        description: The HTML content of the text node.
                                        type: string
                                        nullable: true
                                      text:
                                        description: The raw text content of the text node.
                                        type: string
                                        nullable: true
                        - title: Text Input Node
                          description: 'Represents text input and textarea elements within the DOM. It contains the placeholder text in the input. Additional attributes can be associated with the text for styling or other purposes.

                            '
                          type: object
                          required:
                            - id
                            - type
                            - placeholder
                          properties:
                            id:
                              type: string
                              description: Node UUID
                            type:
                              description: The type of the node
                              type: string
                              enum:
                                - text-input
                              default: text-input
                            placeholder:
                              description: The placeholder text of the input node
                              type: string
                            attributes:
                              type: object
                              description: The custom attributes of the node
                              additionalProperties:
                                type: string
                        - title: Select Node
                          description: 'Represents select elements within the DOM. It contains the list of choices in the select. Additional attributes can be associated with the text for styling or other purposes.

                            '
                          type: object
                          required:
                            - id
                            - type
                            - choices
                          properties:
                            id:
                              type: string
                              description: Node UUID
                            type:
                              description: The type of the node
                              type: string
                              enum:
                                - select
                              default: select
                            choices:
                              description: The list of choices in this select node.
                              type: array
                              items:
                                type: object
                                required:
                                  - value
                                  - text
                                properties:
                                  value:
                                    description: The value of the choice when selected.
                                    type: string
                                  text:
                                    description: The text to display for the choice.
                                    type: string
                            attributes:
                              type: object
                              description: The custom attributes of the node
                              additionalProperties:
                                type: string
                        - title: Submit Button Node
                          description: 'Represents submit button elements within the DOM. It contains the text and waiting text of the button. Additional attributes can be associated with the text for styling or other purposes.

                            '
                          type: object
                          required:
                            - id
                            - type
                            - value
                            - waitingText
                          properties:
                            id:
                              type: string
                              description: Node UUID
                            type:
                              description: The type of the node
                              type: string
                              enum:
                                - submit-button
                              default: submit-button
                            value:
                              description: The text content of the submit button.
                              type: string
                            waitingText:
                              description: The text to show while the form is submitting.
                              type: string
                            attributes:
                              type: object
                              description: The custom attributes of the node
                              additionalProperties:
                                type: string
                        - title: Search Button Node
                          description: 'Represents search button elements within the DOM. It contains the text of the button. Additional attributes can be associated with the text for styling or other purposes.

                            '
                          type: object
                          required:
                            - id
                            - type
                            - value
                          properties:
                            id:
                              type: string
                              description: Node UUID
                            type:
                              description: The type of the node
                              type: string
                              enum:
                                - search-button
                              default: search-button
                            value:
                              description: The text content of the search button.
                              type: string
                            attributes:
                              type: object
                              description: The custom attributes of the node
                              additionalProperties:
                                type: string
                      example:
                        pageId: 658205daa3e8206a523b5ad4
                        nodes:
                          - id: a245c12d-995b-55ee-5ec7-aa36a6cad623
                            type: text
                            text:
                              html: <h1>The Hitchhiker's Guide to the Galaxy</h1>
                              text: The Hitchhiker's Guide to the Galaxy
                            attributes: {}
