                          name: Royal Blue
                          slug: royal-blue
                        - id: 68d98f2fbafc0fd45651cddc44798dd0
                          name: Crimson Red
                          slug: crimson-red
                        - id: 996cd95c97fd5620d0a374c835b37205
                          name: Forrest Green
                          slug: forrest-green
                  name: T-Shirt
                  description: A plain t-shirt
                  slug: t-shirt
                  default-sku: 66072fb71b89448912e2681c
