    patch:
      x-fern-sdk-group-name: orders
      x-fern-sdk-method-name: update
      security:
      - OAuth2:
        - ecommerce:write
      operationId: update-order
      summary: Update Order
      description: 'This API lets you update the fields, `comment`, `shippingProvider`,

        and/or `shippingTracking` for a given order. All three fields can be

        updated simultaneously or independently.


        Required scope | `ecommerce:write`

        '
      tags:
      - Orders
      parameters:
      - name: site_id
        in: path
        description: Unique identifier for a Site
        example: 580e63e98c9a982ac9b8b741
        required: true
        schema:
          type: string
          format: objectid
          default: null
      - name: order_id
        in: path
        description: Unique identifier for an Order
        example: 5e8518516e147040726cc415
        required: true
        schema:
          type: string
          format: objectid
      requestBody:
        description: The order fields to update
        required: true
        content:
          application/json:
            schema:
              description: The order to update
              properties:
                comment:
                  type: string
                  description: Arbitrary data for your records
                  example: Example comment to myself
                shippingProvider:
                  type: string
                  description: Company or method used to ship order
                  example: Shipping Company, Co.
                shippingTracking:
                  type: string
                  description: Tracking number for order shipment
                  example: tr00000000001
                shippingTrackingURL:
                  type: string
                  description: URL to track order shipment
                  example: https://www.shippingcompany.com/tracking/tr00000000001
      responses:
        '200':
          description: Request was successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  orderId:
                    type: string
                    readOnly: true
                    description: 'The order ID. Will usually be 6 hex characters, but can also be 9

                      hex characters if the site has a very large number of Orders.

                      Randomly assigned.

                      '
                    example: dfa-3f1
                  status:
                    type: string
                    example: unfulfilled
                    description: 'The status of the Order

                      '
                    enum:
                    - pending
                    - unfulfilled
                    - fulfilled
                    - disputed
                    - dispute-lost
                    - refunded
                  comment:
                    type: string
                    description: A comment string for this Order, which is editable by API user (not used by Webflow).
                    example: 'Customer requested gift wrapping and a personalized note saying: Happy Birthday, Ford! 🎉 Please
                      ensure the item is packed with extra bubble wrap for safe transit.'
                  orderComment:
                    type: string
                    description: A comment that the customer left when making their Order
                    example: Please gift wrap with a personal note saying "Happy Birthday, Ford! 🎉
                  acceptedOn:
                    type: string
                    format: date-time
                    nullable: true
                    description: The ISO8601 timestamp that an Order was placed.
                    example: '2018-12-03T22:06:15.761Z'
                  fulfilledOn:
                    type: string
                    format: date-time
                    nullable: true
                    description: 'When an Order is marked as ''fulfilled'', this field represents the timestamp of the fulfillment
                      in ISO8601 format. Otherwise, it is null.

                      '
                    example: '2018-12-03T22:06:15.761Z'
                  refundedOn:
                    type: string
                    format: date-time
                    nullable: true
                    description: When an Order is marked as 'refunded', this field represents the timestamp of the fulfillment
                      in ISO8601 format. Otherwise, it is null.
                    example: '2018-12-03T22:06:15.761Z'
                  disputedOn:
                    type: string
                    format: date-time
                    nullable: true
                    description: 'When an Order is marked as ''disputed'', this field represents the timestamp of the fulfillment
                      in ISO8601 format. Otherwise, it is null.

                      '
                    example: '2018-12-03T22:06:15.761Z'
                  disputeUpdatedOn:
                    type: string
                    format: date-time
                    nullable: true
                    description: 'If an Order has been disputed by the customer, this key will be set to the ISO8601 timestamp
                      of the last update received. If the Order is not disputed, the key will be null.

                      '
                    example: '2018-12-03T22:06:15.761Z'
                  disputeLastStatus:
                    type: string
                    description: 'If an order was disputed by the customer, then this key will be set with the [dispute''s
                      status](https://stripe.com/docs/api#dispute_object-status).

                      '
                    example: null
                    enum:
                    - warning_needs_response
                    - warning_under_review
                    - warning_closed
                    - needs_response
                    - under_review
                    - charge_refunded
                    - won
                    - lost
                    nullable: true
                  customerPaid:
                    description: The total paid by the customer
                    properties:
                      unit:
                        description: The three-letter ISO currency code
                        type: string
                        example: USD
                      value:
                        description: The numeric value in the base unit of the currency
                        type: string
                        example: '5892'
                      string:
                        description: The user-facing string representation of the amount
                        type: string
                        example: $58.92
                  netAmount:
                    description: The net amount after application fees
                    properties:
                      unit:
                        description: The three-letter ISO currency code
                        type: string
                        example: USD
                      value:
                        description: The numeric value in the base unit of the currency
                        type: string
                        example: '5892'
                      string:
                        description: The user-facing string representation of the amount
                        type: string
                        example: $58.92
                  applicationFee:
                    description: The application fee assessed by the platform
                    properties:
                      unit:
                        description: The three-letter ISO currency code
                        type: string
                        example: USD
                      value:
                        description: The numeric value in the base unit of the currency
                        type: string
                        example: '5892'
                      string:
                        description: The user-facing string representation of the amount
                        type: string
                        example: $58.92
                  allAddresses:
                    description: All addresses provided by the customer during the ordering flow.
                    type: array
                    example:
                    - type: shipping
                      japanType: kanji
                      addressee: Custmerio Namen
                      line1: 123 Example Road
                      line2: Unit 3
                      city: Examplesville
                      state: CA
                      country: US
                      postalCode: 90012
                    - type: billing
                      japanType: kanji
                      addressee: Custmerio Namen
                      line1: 123 Example Road
                      line2: Unit 3
                      city: Examplesville
                      state: CA
                      country: US
                      postalCode: 90012
                    items:
                      description: A customer address
                      properties:
                        type:
                          description: The type of the order address (billing or shipping)
                          type: string
                          enum:
                          - shipping
                          - billing
                          example: shipping
                        japanType:
                          description: Represents a Japan-only address format. This field will only appear on orders placed
                            from Japan.
                          type: string
                          enum:
                          - kana
                          - kanji
                          nullable: true
                          example: kanji
                        addressee:
                          description: Display name on the address
