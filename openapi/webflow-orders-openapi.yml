  /sites/{site_id}/orders/{order_id}/refund:
    post:
      x-fern-sdk-group-name: orders
      x-fern-sdk-method-name: refund
      security:
      - OAuth2:
        - ecommerce:write
      operationId: refund-order
      summary: Refund Order
      description: 'This API will reverse a Stripe charge and refund an order back to a

        customer. It will also set the order''s status to `refunded`.


        Required scope | `ecommerce:write`

        '
      tags:
      - Orders
      parameters:
      - name: site_id
        in: path
        description: Unique identifier for a Site
        example: 580e63e98c9a982ac9b8b741
        required: true
        schema:
          type: string
          format: objectid
          default: null
      - name: order_id
        in: path
        description: Unique identifier for an Order
        example: 5e8518516e147040726cc415
        required: true
        schema:
          type: string
          format: objectid
      requestBody:
        description: The order fulfillment request
        content:
          application/json:
            schema:
              description: Update an order's status to fulfilled
              properties:
                reason:
                  type: string
                  description: The reason for the refund
                  enum:
                  - duplicate
                  - fraudulent
                  - requested
      responses:
        '200':
          description: Request was successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  orderId:
                    type: string
                    readOnly: true
                    description: 'The order ID. Will usually be 6 hex characters, but can also be 9

                      hex characters if the site has a very large number of Orders.

                      Randomly assigned.

                      '
                    example: dfa-3f1
                  status:
                    type: string
                    example: unfulfilled
                    description: 'The status of the Order

                      '
                    enum:
                    - pending
                    - unfulfilled
                    - fulfilled
                    - disputed
                    - dispute-lost
                    - refunded
                  comment:
                    type: string
                    description: A comment string for this Order, which is editable by API user (not used by Webflow).
                    example: 'Customer requested gift wrapping and a personalized note saying: Happy Birthday, Ford! 🎉 Please
                      ensure the item is packed with extra bubble wrap for safe transit.'
                  orderComment:
                    type: string
                    description: A comment that the customer left when making their Order
                    example: Please gift wrap with a personal note saying "Happy Birthday, Ford! 🎉
                  acceptedOn:
                    type: string
                    format: date-time
                    nullable: true
                    description: The ISO8601 timestamp that an Order was placed.
                    example: '2018-12-03T22:06:15.761Z'
                  fulfilledOn:
                    type: string
                    format: date-time
                    nullable: true
                    description: 'When an Order is marked as ''fulfilled'', this field represents the timestamp of the fulfillment
                      in ISO8601 format. Otherwise, it is null.

                      '
                    example: '2018-12-03T22:06:15.761Z'
                  refundedOn:
                    type: string
                    format: date-time
                    nullable: true
                    description: When an Order is marked as 'refunded', this field represents the timestamp of the fulfillment
                      in ISO8601 format. Otherwise, it is null.
                    example: '2018-12-03T22:06:15.761Z'
                  disputedOn:
                    type: string
                    format: date-time
                    nullable: true
                    description: 'When an Order is marked as ''disputed'', this field represents the timestamp of the fulfillment
                      in ISO8601 format. Otherwise, it is null.

                      '
                    example: '2018-12-03T22:06:15.761Z'
                  disputeUpdatedOn:
                    type: string
                    format: date-time
                    nullable: true
                    description: 'If an Order has been disputed by the customer, this key will be set to the ISO8601 timestamp
                      of the last update received. If the Order is not disputed, the key will be null.

                      '
                    example: '2018-12-03T22:06:15.761Z'
                  disputeLastStatus:
                    type: string
                    description: 'If an order was disputed by the customer, then this key will be set with the [dispute''s
                      status](https://stripe.com/docs/api#dispute_object-status).

                      '
