                    format: objectid
                    description: Unique identifier for a SKU item
                    example: 5bfedb42bab0ad90fa7dad39
                  quantity:
                    type: number
                    description: Total quantity of items remaining in inventory (if inventoryType is finite)
                    example: 100
                  inventoryType:
                    type: string
                    description: infinite or finite
                    enum:
                      - infinite
                      - finite
                    example: finite
                example:
