                          displayName: 660d83ce30f3a599ddb0bdb3_Screenshot%202024-03-20%20at%209.03.24%E2%80%AFPM-p-500.png
                          format: png
                          width: 500
                          height:
                          quality: 100
                          error:
                      altText: A single gum wrapper
                  pagination:
                    total: 2
                    offset: 0
                    limit: 2
