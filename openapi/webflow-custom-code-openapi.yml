  /sites/{site_id}/custom_code/blocks:
    get:
      x-fern-sdk-group-name:
        - sites
        - scripts
      x-fern-sdk-method-name: list-custom-code-blocks
      security:
        - OAuth2:
            - custom_code:read
      operationId: get-site-custom-code-blocks
      summary: Webflow List Custom Code Blocks
      description: "Get a list of scripts that have been applied to a site and/or individual pages.\n\n<Note title=\"Script Registration\">\n  To apply a script to a site or page, the script must first be registered to a site via the [Register Script](/data/reference/custom-code/custom-code/register-hosted) endpoints. Once registered, the script can be applied to a Site or Page using the appropriate endpoints.\n\n  See the documentation on [working with Custom Code](/data/docs/custom-code) for more information.\n</Note>\n\nRequired scope | `custom_code:read`\n"
      tags:
        - Custom Code
      parameters:
        - name: site_id
          in: path
          description: Unique identifier for a Site
          example: 580e63e98c9a982ac9b8b741
          required: true
          schema:
            type: string
            format: objectid
            default:
        - in: query
          example: 0
          allowEmptyValue: true
          name: offset
          description: Offset used for pagination if the results have more than limit records
          required: false
          schema:
            type: integer
        - in: query
          allowEmptyValue: true
          name: limit
          example: 100
          description: 'Maximum number of records to be returned (max limit: 100)'
          required: false
          schema:
            type: integer
      responses:
        '200':
          description: Request was successful
          content:
            application/json:
              schema:
                description: Custom Code Blocks corresponding to where scripts were applied
                properties:
                  blocks:
                    type: array
                    items:
                      description: A specific instance of Custom Code applied to a Site or Page
                      properties:
                        siteId:
                          type: string
                          description: The Site ID where the custom code was applied
                        pageId:
                          type: string
                          nullable: true
                          description: The Page ID (if applied at Page-level)
                        type:
                          type: string
                          nullable: true
                          enum:
                            - page
                            - site
                          description: Whether the Custom Code script is applied at the Site-level or Page-level
                        scripts:
                          type: array
                          description: A list of scripts applied to a Site or a Page
                          items:
                            type: object
                            required:
                              - id
                              - version
                              - location
                            properties:
                              id:
                                description: ID of the registered custom code script
                                type: string
                                format: objectId
                              location:
                                description: Location of the script, either in the header or footer of the published site
                                type: string
                                default: header
                                enum:
                                  - header
                                  - footer
                              version:
                                type: string
                                description: Semantic Version String for the registered script *e.g. 0.0.1*
                              attributes:
                                type: object
                                description: Developer-specified key/value pairs to be applied as attributes to the script
                            example:
                              - id: cms_slider
                              - location: header
                              - version: 1.0.0
                        createdOn:
                          type: string
                          format: date-time
                          readOnly: true
                          description: The date the Block was created
                          example: '2016-10-24T19:42:38.929Z'
                        lastUpdated:
                          type: string
                          format: date-time
                          readOnly: true
                          description: The date the Block was most recently updated
                          example: '2016-10-24T19:42:38.929Z'
                  pagination:
                    description: Pagination object
                    type: object
                    required:
                      - limit
                      - offset
                      - total
                    properties:
                      limit:
                        type: integer
                        description: The limit used for pagination
                        example: 100
                        readOnly: true
                      offset:
                        type: integer
                        description: The offset used for pagination
                        example: 0
                        readOnly: true
                      total:
                        type: integer
                        description: The total number of records
                        example: 100
                        readOnly: true
                example:
                  blocks:
                    - siteId: 6258612d1ee792848f805dcf
                      pageId:
                      type: site
                      scripts:
                        - id: chartjs
                          displayName: ChartJS
                          version: 4.4.2
                          location: header
                          attributes: {}
                      lastUpdated: '2024-04-03T16:49:15.461Z'
                      createdOn: '2024-04-03T16:49:15.461Z'
                    - siteId: 6390c49674a71f84b51a08d8
                      pageId: 6419db964a9c43f6a3af6348
                      type: page
                      scripts:
                        - id: cms_slider
                          location: header
                          version: 1.0.0
                          attributes:
                            my-attribute: some-value
                        - id: alert
                          location: header
                          version: 0.0.1
                          attributes: {}
                      lastUpdated: '2022-10-26T00:28:54.191Z'
                      createdOn: '2022-10-26T00:28:54.191Z'
                  pagination:
                    total: 1
                    offset: 0
                    limit: 10
