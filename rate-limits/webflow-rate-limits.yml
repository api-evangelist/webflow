specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Webflow
providerId: webflow
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - CMS
  - Ecommerce
  - No-Code
  - Web Development
  - Rate Limiting
description: Webflow's Data API enforces a per-API-key, per-minute rate limit that scales with the
  site's subscription tier. Limits are scoped to the API key (each key has its own budget); cached
  reads against the content-delivery API are effectively unlimited. The Site Publish endpoint adds
  a hard "one successful publish per minute" limit on top of the per-minute call budget.
sources:
  - https://developers.webflow.com/data/reference/rate-limits
  - https://webflow.com/pricing
headers:
  limit: X-RateLimit-Limit
  remaining: X-RateLimit-Remaining
  retryAfter: Retry-After
responseCodes:
  throttled: 429
limits:
  - name: Starter / Basic Site Plans
    scope: key
    metric: requests_per_minute
    limit: 60
    timeFrame: minute
    notes: Per API key, on Starter and Basic Site plans.
  - name: CMS / Ecommerce / Business Site Plans
    scope: key
    metric: requests_per_minute
    limit: 120
    timeFrame: minute
    notes: Per API key, on CMS, Ecommerce, and Business Site plans.
  - name: Enterprise Site Plans
    scope: key
    metric: requests_per_minute
    limit: -1
    notes: Custom rate limit negotiated as part of the Enterprise contract.
  - name: Site Publish
    scope: site
    metric: requests_per_minute
    limit: 1
    timeFrame: minute
    notes: At most one successful publish per site per minute, regardless of plan.
  - name: Cached Content-Delivery Reads
    scope: key
    metric: varies
    limit: effectively unlimited
    notes: Cached requests served by the content-delivery API are not subject to the per-minute API
      rate limit.
policies:
  - name: Per-Key Scoping
    description: Rate limits are applied per API key. Different keys on the same site have independent
      budgets, so per-environment / per-app keys can be used to isolate noisy clients.
  - name: 429 Handling
    description: When throttled, the API returns 429 with a Retry-After header (typically 60 seconds).
      The official Webflow SDK implements exponential backoff automatically.
  - name: Webhooks Over Polling
    description: Webflow recommends webhook subscriptions for change notifications instead of polling
      to keep within the per-minute budget.
maintainers:
