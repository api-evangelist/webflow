          in: path
          type: string
          description: Unique identifier for a Site
          required: true
        - name: order_id
          in: path
          type: string
          description: Unique identifier for an Order
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: sites-site_id-orders-order_id-refund
      path: /sites/{site_id}/orders/{order_id}/refund
      operations:
      - name: refundorder
        method: POST
        description: Webflow Refund Order
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
