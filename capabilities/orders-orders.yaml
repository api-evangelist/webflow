    baseUri: https://api.webflow.com/v2
    description: Webflow Orders API — Orders business capability. Self-contained, no shared references.
    resources:
    - name: sites-site_id-orders
      path: /sites/{site_id}/orders
      operations:
      - name: listorders
        method: GET
        description: Webflow List Orders
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: site_id
          in: path
          type: string
          description: Unique identifier for a Site
          required: true
        - name: status
          in: query
          type: string
          description: Filter the orders by status
        - name: offset
          in: query
          type: integer
          description: Offset used for pagination if the results have more than limit records
        - name: limit
          in: query
          type: integer
          description: 'Maximum number of records to be returned (max limit: 100)'
    - name: sites-site_id-orders-order_id
      path: /sites/{site_id}/orders/{order_id}
      operations:
      - name: getorder
        method: GET
        description: Webflow Get Order
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
