naftiko: 1.0.0-alpha2
info:
  label: Webflow Orders API — Orders
  description: 'Webflow Orders API — Orders. 6 operations. Lead operation: Webflow List Orders. Self-contained Naftiko capability
    covering one Webflow business surface.'
  tags:
  - Webflow
  - Orders
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    WEBFLOW_API_KEY: WEBFLOW_API_KEY
capability:
