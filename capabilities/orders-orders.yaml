          in: path
          type: string
          description: Unique identifier for a Site
          required: true
        - name: order_id
          in: path
          type: string
          description: Unique identifier for an Order
          required: true
      - name: updateorder
        method: PATCH
        description: Webflow Update Order
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: site_id
          in: path
          type: string
          description: Unique identifier for a Site
          required: true
        - name: order_id
          in: path
          type: string
          description: Unique identifier for an Order
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: sites-site_id-orders-order_id-fulfill
      path: /sites/{site_id}/orders/{order_id}/fulfill
      operations:
      - name: fulfillorder
        method: POST
        description: Webflow Fulfill Order
        outputRawFormat: json
