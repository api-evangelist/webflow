naftiko: 1.0.0-alpha2
info:
  label: Webflow Sites API — Site Administration
  description: 'Webflow Sites API — Site Administration. 2 operations. Lead operation: Webflow Set a well-known file. Self-contained
    Naftiko capability covering one Webflow business surface.'
  tags:
  - Webflow
  - Site Administration
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    WEBFLOW_API_KEY: WEBFLOW_API_KEY
capability:
  consumes:
  - type: http
    namespace: sites-site-administration
    baseUri: https://api.webflow.com/v2
    description: Webflow Sites API — Site Administration business capability. Self-contained, no shared references.
    resources:
    - name: sites-site_id-well_known
      path: /sites/{site_id}/well_known
      operations:
      - name: setwellknown
        method: PUT
        description: Webflow Set a well-known file
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: site_id
          in: path
          type: string
          description: Unique identifier for a Site
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
      - name: deletewellknown
        method: DELETE
        description: Webflow Delete a well-known file
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: site_id
          in: path
          type: string
          description: Unique identifier for a Site
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: bearer
      token: '{{env.WEBFLOW_API_KEY}}'
  exposes:
  - type: rest
    namespace: sites-site-administration-rest
    port: 8080
    description: REST adapter for Webflow Sites API — Site Administration. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/sites/{site-id}/well-known
      name: sites-site-id-well-known
      description: REST surface for sites-site_id-well_known.
      operations:
      - method: PUT
        name: setwellknown
        description: Webflow Set a well-known file
        call: sites-site-administration.setwellknown
        with:
          site_id: rest.site_id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deletewellknown
        description: Webflow Delete a well-known file
        call: sites-site-administration.deletewellknown
        with:
          site_id: rest.site_id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: sites-site-administration-mcp
    port: 9090
    transport: http
    description: MCP adapter for Webflow Sites API — Site Administration. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: webflow-set-well-known-file
      description: Webflow Set a well-known file
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: sites-site-administration.setwellknown
      with:
        site_id: tools.site_id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: webflow-delete-well-known-file
      description: Webflow Delete a well-known file
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: sites-site-administration.deletewellknown
      with:
        site_id: tools.site_id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
