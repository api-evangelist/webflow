naftiko: 1.0.0-alpha2
info:
  label: Webflow Data API — Site Activity
  description: 'Webflow Data API — Site Activity. 1 operations. Lead operation: Webflow Get Site Activity Logs. Self-contained
    Naftiko capability covering one Webflow business surface.'
  tags:
  - Webflow
  - Site Activity
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    WEBFLOW_API_KEY: WEBFLOW_API_KEY
capability:
  consumes:
  - type: http
    namespace: data-site-activity
    baseUri: https://api.webflow.com/v2
    description: Webflow Data API — Site Activity business capability. Self-contained, no shared references.
    resources:
    - name: sites-site_id-activity_logs
      path: /sites/{site_id}/activity_logs
      operations:
      - name: getsiteactivitylogs
        method: GET
        description: Webflow Get Site Activity Logs
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: site_id
          in: path
          type: string
          description: Unique identifier for a Site
          required: true
        - name: limit
          in: query
          type: integer
          description: 'Maximum number of records to be returned (max limit: 100)'
        - name: offset
          in: query
          type: integer
          description: Offset used for pagination if the results have more than limit records
    authentication:
      type: bearer
      token: '{{env.WEBFLOW_API_KEY}}'
  exposes:
  - type: rest
    namespace: data-site-activity-rest
    port: 8080
    description: REST adapter for Webflow Data API — Site Activity. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/sites/{site-id}/activity-logs
      name: sites-site-id-activity-logs
      description: REST surface for sites-site_id-activity_logs.
      operations:
      - method: GET
        name: getsiteactivitylogs
        description: Webflow Get Site Activity Logs
        call: data-site-activity.getsiteactivitylogs
        with:
          site_id: rest.site_id
          limit: rest.limit
          offset: rest.offset
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: data-site-activity-mcp
    port: 9090
    transport: http
    description: MCP adapter for Webflow Data API — Site Activity. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: webflow-get-site-activity-logs
      description: Webflow Get Site Activity Logs
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: data-site-activity.getsiteactivitylogs
      with:
        site_id: tools.site_id
        limit: tools.limit
        offset: tools.offset
      outputParameters:
      - type: object
        mapping: $.
