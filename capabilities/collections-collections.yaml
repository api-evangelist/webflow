          value: $.
        inputParameters:
        - name: collection_id
          in: path
          type: string
          description: Unique identifier for a Collection
          required: true
        - name: field_id
          in: path
          type: string
          description: Unique identifier for a Field in a collection
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
