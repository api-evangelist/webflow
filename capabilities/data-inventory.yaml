naftiko: 1.0.0-alpha2
info:
  label: Webflow Data API — Inventory
  description: 'Webflow Data API — Inventory. 2 operations. Lead operation: Webflow List Inventory. Self-contained Naftiko
    capability covering one Webflow business surface.'
  tags:
  - Webflow
  - Inventory
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    WEBFLOW_API_KEY: WEBFLOW_API_KEY
capability:
  consumes:
  - type: http
    namespace: data-inventory
    baseUri: https://api.webflow.com/v2
    description: Webflow Data API — Inventory business capability. Self-contained, no shared references.
    resources:
    - name: collections-sku_collection_id-items-sku_id-inventory
      path: /collections/{sku_collection_id}/items/{sku_id}/inventory
      operations:
      - name: listinventory
        method: GET
        description: Webflow List Inventory
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: sku_collection_id
          in: path
          type: string
          description: Unique identifier for a SKU collection. Use the List Collections API to find this ID.
          required: true
        - name: sku_id
          in: path
          type: string
          description: Unique identifier for a SKU
          required: true
      - name: updateinventory
        method: PATCH
        description: Webflow Update Item Inventory
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: sku_collection_id
          in: path
          type: string
          description: Unique identifier for a SKU collection. Use the List Collections API to find this ID.
          required: true
        - name: sku_id
          in: path
          type: string
          description: Unique identifier for a SKU
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.WEBFLOW_API_KEY}}'
  exposes:
  - type: rest
    namespace: data-inventory-rest
    port: 8080
    description: REST adapter for Webflow Data API — Inventory. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/collections/{sku-collection-id}/items/{sku-id}/inventory
      name: collections-sku-collection-id-items-sku-id-inventory
      description: REST surface for collections-sku_collection_id-items-sku_id-inventory.
      operations:
      - method: GET
        name: listinventory
        description: Webflow List Inventory
        call: data-inventory.listinventory
        with:
          sku_collection_id: rest.sku_collection_id
          sku_id: rest.sku_id
        outputParameters:
        - type: object
          mapping: $.
      - method: PATCH
        name: updateinventory
        description: Webflow Update Item Inventory
        call: data-inventory.updateinventory
        with:
          sku_collection_id: rest.sku_collection_id
          sku_id: rest.sku_id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: data-inventory-mcp
    port: 9090
    transport: http
    description: MCP adapter for Webflow Data API — Inventory. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: webflow-list-inventory
      description: Webflow List Inventory
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: data-inventory.listinventory
      with:
        sku_collection_id: tools.sku_collection_id
        sku_id: tools.sku_id
      outputParameters:
      - type: object
        mapping: $.
    - name: webflow-update-item-inventory
      description: Webflow Update Item Inventory
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: data-inventory.updateinventory
      with:
        sku_collection_id: tools.sku_collection_id
        sku_id: tools.sku_id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
