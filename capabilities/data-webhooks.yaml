naftiko: 1.0.0-alpha2
info:
  label: Webflow Data API — Webhooks
  description: 'Webflow Data API — Webhooks. 4 operations. Lead operation: Webflow List Webhooks. Self-contained Naftiko capability
    covering one Webflow business surface.'
  tags:
  - Webflow
  - Webhooks
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    WEBFLOW_API_KEY: WEBFLOW_API_KEY
capability:
  consumes:
  - type: http
    namespace: data-webhooks
    baseUri: https://api.webflow.com/v2
    description: Webflow Data API — Webhooks business capability. Self-contained, no shared references.
    resources:
    - name: sites-site_id-webhooks
      path: /sites/{site_id}/webhooks
      operations:
      - name: listwebhooks
        method: GET
        description: Webflow List Webhooks
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: site_id
          in: path
          type: string
          description: Unique identifier for a Site
          required: true
      - name: createwebhook
        method: POST
        description: Webflow Create Webhook
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: site_id
          in: path
          type: string
          description: Unique identifier for a Site
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: webhooks-webhook_id
      path: /webhooks/{webhook_id}
      operations:
      - name: getwebhook
        method: GET
        description: Webflow Get Webhook
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: webhook_id
          in: path
          type: string
          description: Unique identifier for a Webhook
          required: true
      - name: removewebhook
        method: DELETE
        description: Webflow Remove Webhook
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: webhook_id
          in: path
          type: string
          description: Unique identifier for a Webhook
          required: true
    authentication:
      type: bearer
      token: '{{env.WEBFLOW_API_KEY}}'
  exposes:
  - type: rest
    namespace: data-webhooks-rest
    port: 8080
    description: REST adapter for Webflow Data API — Webhooks. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/sites/{site-id}/webhooks
      name: sites-site-id-webhooks
      description: REST surface for sites-site_id-webhooks.
      operations:
      - method: GET
        name: listwebhooks
        description: Webflow List Webhooks
        call: data-webhooks.listwebhooks
        with:
          site_id: rest.site_id
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createwebhook
        description: Webflow Create Webhook
        call: data-webhooks.createwebhook
        with:
          site_id: rest.site_id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/webhooks/{webhook-id}
      name: webhooks-webhook-id
      description: REST surface for webhooks-webhook_id.
      operations:
      - method: GET
        name: getwebhook
        description: Webflow Get Webhook
        call: data-webhooks.getwebhook
        with:
          webhook_id: rest.webhook_id
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: removewebhook
        description: Webflow Remove Webhook
        call: data-webhooks.removewebhook
        with:
          webhook_id: rest.webhook_id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: data-webhooks-mcp
    port: 9090
    transport: http
    description: MCP adapter for Webflow Data API — Webhooks. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: webflow-list-webhooks
      description: Webflow List Webhooks
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: data-webhooks.listwebhooks
      with:
        site_id: tools.site_id
      outputParameters:
      - type: object
        mapping: $.
    - name: webflow-create-webhook
      description: Webflow Create Webhook
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: data-webhooks.createwebhook
      with:
        site_id: tools.site_id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: webflow-get-webhook
      description: Webflow Get Webhook
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: data-webhooks.getwebhook
      with:
        webhook_id: tools.webhook_id
      outputParameters:
      - type: object
        mapping: $.
    - name: webflow-remove-webhook
      description: Webflow Remove Webhook
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: data-webhooks.removewebhook
      with:
        webhook_id: tools.webhook_id
      outputParameters:
      - type: object
        mapping: $.
