naftiko: 1.0.0-alpha2
info:
  label: Webflow Custom Code API — Registered Scripts
  description: 'Webflow Custom Code API — Registered Scripts. 3 operations. Lead operation: Webflow Get Registered Scripts.
    Self-contained Naftiko capability covering one Webflow business surface.'
  tags:
  - Webflow
  - Registered Scripts
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    WEBFLOW_API_KEY: WEBFLOW_API_KEY
capability:
  consumes:
  - type: http
    namespace: custom-code-registered-scripts
    baseUri: https://api.webflow.com/v2
    description: Webflow Custom Code API — Registered Scripts business capability. Self-contained, no shared references.
    resources:
    - name: sites-site_id-registered_scripts
      path: /sites/{site_id}/registered_scripts
      operations:
      - name: getscripts
        method: GET
        description: Webflow Get Registered Scripts
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: site_id
          in: path
          type: string
          description: Unique identifier for a Site
          required: true
    - name: sites-site_id-registered_scripts-hosted
      path: /sites/{site_id}/registered_scripts/hosted
      operations:
      - name: posthostedscript
        method: POST
        description: Webflow Register Script - Hosted
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: site_id
          in: path
          type: string
          description: Unique identifier for a Site
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: sites-site_id-registered_scripts-inline
      path: /sites/{site_id}/registered_scripts/inline
      operations:
      - name: postinlinescripts
        method: POST
        description: Webflow Register Script - Inline
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: site_id
          in: path
          type: string
          description: Unique identifier for a Site
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: bearer
      token: '{{env.WEBFLOW_API_KEY}}'
  exposes:
  - type: rest
    namespace: custom-code-registered-scripts-rest
    port: 8080
    description: REST adapter for Webflow Custom Code API — Registered Scripts. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/sites/{site-id}/registered-scripts
      name: sites-site-id-registered-scripts
      description: REST surface for sites-site_id-registered_scripts.
      operations:
      - method: GET
        name: getscripts
        description: Webflow Get Registered Scripts
        call: custom-code-registered-scripts.getscripts
        with:
          site_id: rest.site_id
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/sites/{site-id}/registered-scripts/hosted
      name: sites-site-id-registered-scripts-hosted
      description: REST surface for sites-site_id-registered_scripts-hosted.
      operations:
      - method: POST
        name: posthostedscript
        description: Webflow Register Script - Hosted
        call: custom-code-registered-scripts.posthostedscript
        with:
          site_id: rest.site_id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/sites/{site-id}/registered-scripts/inline
      name: sites-site-id-registered-scripts-inline
      description: REST surface for sites-site_id-registered_scripts-inline.
      operations:
      - method: POST
        name: postinlinescripts
        description: Webflow Register Script - Inline
        call: custom-code-registered-scripts.postinlinescripts
        with:
          site_id: rest.site_id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: custom-code-registered-scripts-mcp
    port: 9090
    transport: http
    description: MCP adapter for Webflow Custom Code API — Registered Scripts. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: webflow-get-registered-scripts
      description: Webflow Get Registered Scripts
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: custom-code-registered-scripts.getscripts
      with:
        site_id: tools.site_id
      outputParameters:
      - type: object
        mapping: $.
    - name: webflow-register-script-hosted
      description: Webflow Register Script - Hosted
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: custom-code-registered-scripts.posthostedscript
      with:
        site_id: tools.site_id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: webflow-register-script-inline
      description: Webflow Register Script - Inline
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: custom-code-registered-scripts.postinlinescripts
      with:
        site_id: tools.site_id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
