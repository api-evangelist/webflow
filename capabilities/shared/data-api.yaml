naftiko: "1.0.0-alpha1"

info:
  label: "Webflow Data API"
  description: >-
    Webflow Data API for programmatically managing sites, CMS collections and
    items, ecommerce products and orders, assets, users, forms, and webhooks.
    Supports OAuth 2.0 and API key authentication.
  tags:
    - Webflow
    - CMS
    - Data API
    - Ecommerce
    - Sites
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      WEBFLOW_API_KEY: WEBFLOW_API_KEY

capability:
  consumes:
    - type: http
      namespace: webflow-data
      baseUri: https://api.webflow.com/v2
      description: "Webflow Data API v2"
      authentication:
        type: apikey
        key: Authorization
        value: "Bearer {{WEBFLOW_API_KEY}}"
        placement: header
      resources:
        - name: sites
          path: /sites
          description: "Webflow sites within a workspace"
          operations:
            - name: list-sites
              method: GET
              description: "List Sites"
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-site
              method: GET
              description: "Get Site"
              inputParameters:
                - name: site_id
                  in: path
                  type: string
                  required: true
                  description: "Unique identifier for a Webflow site"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: publish-site
              method: POST
              description: "Publish Site"
              inputParameters:
                - name: site_id
                  in: path
                  type: string
                  required: true
                  description: "Unique identifier for a Webflow site"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  customDomains: "{{tools.customDomains}}"

        - name: collections
          path: /sites/{site_id}/collections
          description: "CMS collections within a Webflow site"
          operations:
            - name: list-collections
              method: GET
              description: "List Collections"
              inputParameters:
                - name: site_id
                  in: path
                  type: string
                  required: true
                  description: "Unique identifier for a Webflow site"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-collection
              method: GET
              description: "Get Collection"
              inputParameters:
                - name: collection_id
                  in: path
                  type: string
                  required: true
                  description: "Unique identifier for a CMS collection"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: items
          path: /collections/{collection_id}/items
          description: "CMS items within a Webflow collection"
          operations:
            - name: list-items
              method: GET
              description: "List Collection Items"
              inputParameters:
                - name: collection_id
                  in: path
                  type: string
                  required: true
                  description: "Unique identifier for a CMS collection"
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Maximum number of items to return"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-item
              method: POST
              description: "Create Item"
              inputParameters:
                - name: collection_id
                  in: path
                  type: string
                  required: true
                  description: "Unique identifier for a CMS collection"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  fieldData: "{{tools.fieldData}}"
                  isDraft: "{{tools.isDraft}}"
            - name: update-item
              method: PATCH
              description: "Update Item"
              inputParameters:
                - name: collection_id
                  in: path
                  type: string
                  required: true
                  description: "Unique identifier for a CMS collection"
                - name: item_id
                  in: path
                  type: string
                  required: true
                  description: "Unique identifier for a CMS item"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  fieldData: "{{tools.fieldData}}"
            - name: delete-item
              method: DELETE
              description: "Delete Item"
              inputParameters:
                - name: collection_id
                  in: path
                  type: string
                  required: true
                  description: "Unique identifier for a CMS collection"
                - name: item_id
                  in: path
                  type: string
                  required: true
                  description: "Unique identifier for a CMS item"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: publish-item
              method: POST
              description: "Publish Item"
              inputParameters:
                - name: collection_id
                  in: path
                  type: string
                  required: true
                  description: "Unique identifier for a CMS collection"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  itemIds: "{{tools.itemIds}}"

        - name: webhooks
          path: /sites/{site_id}/webhooks
          description: "Webhooks for Webflow site event notifications"
          operations:
            - name: list-webhooks
              method: GET
              description: "List Webhooks"
              inputParameters:
                - name: site_id
                  in: path
                  type: string
                  required: true
                  description: "Unique identifier for a Webflow site"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-webhook
              method: POST
              description: "Create Webhook"
              inputParameters:
                - name: site_id
                  in: path
                  type: string
                  required: true
                  description: "Unique identifier for a Webflow site"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  triggerType: "{{tools.triggerType}}"
                  url: "{{tools.url}}"

  exposes:
    - type: rest
      port: 8101
      namespace: webflow-data-rest
      resources:
        - path: /v1/sites
          name: sites
          operations:
            - method: GET
              name: list-sites
              description: "List Webflow sites"
              call: "webflow-data.list-sites"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/items
          name: items
          operations:
            - method: GET
              name: list-items
              description: "List CMS items"
              call: "webflow-data.list-items"
              with:
                collection_id: "rest.collection_id"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9101
      namespace: webflow-data-mcp
      transport: http
      tools:
        - name: list-sites
          description: "List Webflow sites"
          hints:
            readOnly: true
            openWorld: true
          call: "webflow-data.list-sites"
          outputParameters:
            - type: object
              mapping: "$."
        - name: publish-site
          description: "Publish a Webflow site"
          hints:
            readOnly: false
            destructive: false
          call: "webflow-data.publish-site"
          with:
            site_id: "tools.site_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-collections
          description: "List CMS collections in a Webflow site"
          hints:
            readOnly: true
            openWorld: true
          call: "webflow-data.list-collections"
          with:
            site_id: "tools.site_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-items
          description: "List CMS items in a collection"
          hints:
            readOnly: true
            openWorld: true
          call: "webflow-data.list-items"
          with:
            collection_id: "tools.collection_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-item
          description: "Create a CMS item"
          hints:
            readOnly: false
            destructive: false
          call: "webflow-data.create-item"
          with:
            collection_id: "tools.collection_id"
            fieldData: "tools.fieldData"
          outputParameters:
            - type: object
              mapping: "$."
        - name: update-item
          description: "Update a CMS item"
          hints:
            readOnly: false
            destructive: false
            idempotent: true
          call: "webflow-data.update-item"
          with:
            collection_id: "tools.collection_id"
            item_id: "tools.item_id"
            fieldData: "tools.fieldData"
          outputParameters:
            - type: object
              mapping: "$."
        - name: publish-item
          description: "Publish CMS items to the live site"
          hints:
            readOnly: false
            destructive: false
          call: "webflow-data.publish-item"
          with:
            collection_id: "tools.collection_id"
            itemIds: "tools.itemIds"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-webhooks
          description: "List webhooks for a site"
          hints:
            readOnly: true
            openWorld: false
          call: "webflow-data.list-webhooks"
          with:
            site_id: "tools.site_id"
          outputParameters:
            - type: object
              mapping: "$."
