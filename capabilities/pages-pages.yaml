    baseUri: https://api.webflow.com/v2
    description: Webflow Pages API — Pages business capability. Self-contained, no shared references.
    resources:
    - name: pages-page_id
      path: /pages/{page_id}
      operations:
      - name: getpagemetadata
        method: GET
        description: Webflow Get Page Metadata
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: page_id
          in: path
          type: string
          description: Unique identifier for a Page
          required: true
        - name: localeId
          in: query
          type: string
          description: Unique identifier for a specific Locale.
      - name: updatepagesettings
        method: PUT
        description: Webflow Update Page Metadata
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: page_id
          in: path
          type: string
          description: Unique identifier for a Page
          required: true
        - name: localeId
          in: query
          type: string
          description: Unique identifier for a specific Locale.
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: pages-page_id-dom
      path: /pages/{page_id}/dom
      operations:
      - name: getstaticcontent
        method: GET
        description: Webflow Get Page Content
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: page_id
          in: path
          type: string
          description: Unique identifier for a Page
          required: true
        - name: localeId
          in: query
          type: string
          description: Unique identifier for a specific Locale.
        - name: limit
          in: query
          type: integer
          description: 'Maximum number of records to be returned (max limit: 100)'
        - name: offset
          in: query
          type: integer
          description: Offset used for pagination if the results have more than limit records
      - name: updatestaticcontent
        method: POST
        description: Webflow Update Page Content
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: page_id
          in: path
          type: string
          description: Unique identifier for a Page
          required: true
        - name: localeId
          in: query
          type: string
          description: The locale identifier.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: sites-site_id-pages
      path: /sites/{site_id}/pages
      operations:
      - name: listpages
        method: GET
        description: Webflow List Pages
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: site_id
          in: path
          type: string
          description: Unique identifier for a Site
          required: true
        - name: localeId
          in: query
          type: string
          description: Unique identifier for a specific Locale.
        - name: limit
          in: query
          type: integer
          description: 'Maximum number of records to be returned (max limit: 100)'
        - name: offset
          in: query
          type: integer
          description: Offset used for pagination if the results have more than limit records
    authentication:
      type: bearer
      token: '{{env.WEBFLOW_API_KEY}}'
  exposes:
