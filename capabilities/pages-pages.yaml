      outputParameters:
      - type: object
        mapping: $.
    - name: webflow-list-pages
      description: Webflow List Pages
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: pages-pages.listpages
      with:
        site_id: tools.site_id
        localeId: tools.localeId
        limit: tools.limit
        offset: tools.offset
      outputParameters:
      - type: object
        mapping: $.
