      description: Webflow Get Custom Code
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: data-custom-code-pages.getpagecustomcode
      with:
        page_id: tools.page_id
      outputParameters:
      - type: object
        mapping: $.
    - name: webflow-delete-custom-code
      description: Webflow Delete Custom Code
      hints:
